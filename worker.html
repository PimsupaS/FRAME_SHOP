<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worker — ตรวจสอบ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap');
:root{--red:#CC0000;--red-dark:#A00000;--pass:#057A55;--pass-bg:#ECFDF5;--pass-border:#6EE7B7;--fail-bg:#FFF5F5;--fail-border:#FFBABA;--bg:#F5F5F5;--card:#fff;--text:#1A1A1A;--muted:#6B7280;--border:#E5E7EB;--shadow:0 2px 12px rgba(0,0,0,.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}
.header{background:var(--red);color:#fff;padding:18px 16px 28px;}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.back-btn:hover{background:rgba(255,255,255,.3);}
.logo{font-size:16px;font-weight:800;letter-spacing:.05em;}
.header-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;opacity:.65;margin-bottom:2px;}
.header-name{font-size:20px;font-weight:800;line-height:1.2;}
.header-sub{font-size:13px;opacity:.75;margin-top:2px;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;opacity:.75;margin-top:8px;flex-wrap:wrap;}
.breadcrumb span{opacity:.6;}
.section{margin:14px 14px 0;}
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:8px;}
.grid{display:flex;flex-direction:column;gap:8px;}
.nav-card{background:var(--card);border-radius:12px;border:1.5px solid var(--border);padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.nav-card:active{transform:scale(.98);}
.nav-icon{font-size:26px;flex-shrink:0;}
.nav-info{flex:1;min-width:0;}
.nav-title{font-size:15px;font-weight:700;}
.nav-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.nav-arrow{font-size:20px;color:var(--red);font-weight:700;flex-shrink:0;}
/* sub-type selector chips */
.subtype-row{display:flex;gap:8px;flex-wrap:wrap;margin:0 14px;}
.subtype-chip{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:14px;font-weight:600;cursor:pointer;flex:1;text-align:center;min-width:100px;transition:all .15s;}
.subtype-chip:active{transform:scale(.97);}
.subtype-chip.active{background:var(--red);border-color:var(--red);color:#fff;}
/* Check form */
.meta-card{background:var(--card);margin:0 14px;border-radius:0 0 12px 12px;box-shadow:var(--shadow);padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;border-top:1px solid var(--border);}
.meta-item label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px;}
.meta-item input,.meta-item select{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-family:'Sarabun',sans-serif;font-size:14px;background:#F9FAFB;outline:none;transition:border-color .15s;}
.meta-item input:focus,.meta-item select:focus{border-color:var(--red);background:#fff;}
.progress-wrap{margin:14px 14px 0;}
.progress-bg{background:#E5E7EB;border-radius:99px;height:5px;overflow:hidden;}
.progress-fill{background:var(--red);height:100%;border-radius:99px;transition:width .3s;width:0%;}
.progress-label{font-size:11px;color:var(--muted);text-align:right;margin-top:3px;}
.check-list{display:flex;flex-direction:column;gap:8px;}
.check-item{background:var(--card);border-radius:12px;border:1.5px solid var(--border);padding:12px 14px;box-shadow:var(--shadow);transition:border-color .2s,background .2s;}
.check-item.pass{border-color:var(--pass-border);background:var(--pass-bg);}
.check-item.fail{border-color:var(--fail-border);background:var(--fail-bg);}
.check-top{display:flex;align-items:flex-start;gap:10px;}
.check-num{background:#FFE8E8;color:var(--red);font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;flex-shrink:0;margin-top:2px;}
.check-info{flex:1;min-width:0;}
.check-name{font-size:14px;font-weight:600;line-height:1.35;}
.check-std{font-size:12px;color:var(--muted);margin-top:2px;}
.toggle-group{display:flex;gap:6px;flex-shrink:0;margin-top:2px;}
.tbtn{width:40px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.tbtn.ap{background:var(--pass);border-color:var(--pass);color:#fff;}
.tbtn.af{background:var(--red);border-color:var(--red);color:#fff;}
.comment-row{margin-top:8px;}
.comment-row textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-family:'Sarabun',sans-serif;font-size:13px;resize:none;outline:none;background:#fff;min-height:56px;transition:border-color .15s;}
.comment-row textarea:focus{border-color:var(--red);}
.field-card{background:var(--card);border-radius:12px;border:1.5px solid var(--border);padding:13px 14px;box-shadow:var(--shadow);}
.field-card label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;}
.field-card input,.field-card textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 10px;font-family:'Sarabun',sans-serif;font-size:14px;outline:none;background:#F9FAFB;transition:border-color .15s;}
.field-card input:focus,.field-card textarea:focus{border-color:var(--red);background:#fff;}
.field-card textarea{resize:none;min-height:64px;}
.submit-btn{width:calc(100% - 28px);margin:16px 14px 0;background:var(--red);color:#fff;border:none;border-radius:12px;padding:15px;font-family:'Sarabun',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;}
.submit-btn:hover{background:var(--red-dark);}
.success-screen{display:none;padding:40px 20px;text-align:center;}
.success-screen.show{display:block;}
.success-icon{font-size:64px;margin-bottom:12px;}
.success-title{font-size:22px;font-weight:700;margin-bottom:6px;}
.success-sub{font-size:14px;color:var(--muted);margin-bottom:28px;}
.success-info{background:#F9FAFB;border-radius:12px;padding:14px;text-align:left;font-size:14px;line-height:2;border:1.5px solid var(--border);margin-bottom:20px;}
.reset-btn{width:100%;background:#F3F4F6;color:var(--text);border:none;border-radius:12px;padding:14px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;}
.home-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#111827;color:#fff;border-radius:12px;padding:13px 20px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:transform .3s;z-index:999;text-align:center;min-width:260px;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--pass);}.toast.err{background:var(--red);}
.page{display:none;}.page.active{display:block;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">ISUZU FRG</div>
    <button class="back-btn" id="backBtn" onclick="goBack()" style="display:none;">← ย้อนกลับ</button>
  </div>
  <div class="header-title" id="headerLabel">เลือก Group</div>
  <div class="header-name" id="headerName">Worker — ตรวจสอบ</div>
  <div class="header-sub" id="headerSub">กรุณาเลือก Group ของคุณ</div>
  <div class="breadcrumb" id="breadcrumb"></div>
</div>

<!-- PAGE 1: เลือก Group -->
<div class="page active" id="page-group">
  <div class="section">
    <div class="section-title">เลือก Group</div>
    <div class="grid" id="groupGrid"></div>
  </div>
</div>

<!-- PAGE 2: เลือกประเภทหลัก -->
<div class="page" id="page-type">
  <div class="section">
    <div class="section-title">เลือกประเภทรายการตรวจสอบ</div>
    <div class="grid" id="typeGrid"></div>
  </div>
</div>

<!-- PAGE 3: เลือก Stage -->
<div class="page" id="page-stage">
  <div class="section">
    <div class="section-title">เลือก Stage</div>
    <div class="grid" id="stageGrid"></div>
  </div>
</div>

<!-- PAGE 4: เลือกประเภทย่อย (ถ้ามี) -->
<div class="page" id="page-subtype">
  <div class="section">
    <div class="section-title">เลือกรายละเอียด</div>
    <div class="subtype-row" id="subtypeRow"></div>
  </div>
</div>

<!-- PAGE 5: กรอกแบบฟอร์ม -->
<div class="page" id="page-form">
  <div class="meta-card">
    <div class="meta-item"><label>วันที่</label><input type="date" id="inputDate"></div>
    <div class="meta-item">
      <label>กะทำงาน</label>
      <select id="inputShift">
        <option value="A">SHIFT A</option>
        <option value="B">SHIFT B</option>
      </select>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bg"><div class="progress-fill" id="pFill"></div></div>
    <div class="progress-label" id="pLabel">ตรวจแล้ว 0 / 0 รายการ</div>
  </div>
  <div class="section">
    <div class="section-title">หัวข้อตรวจสอบ</div>
    <div class="check-list" id="checkList"></div>
  </div>
  <div class="section">
    <div class="section-title">หมายเหตุ (ถ้ามี)</div>
    <div class="field-card">
      <label>บันทึกเพิ่มเติม</label>
      <textarea id="remarkText" placeholder="สิ่งผิดปกติ, แจ้งซ่อม..."></textarea>
    </div>
  </div>
  <div class="section">
    <div class="section-title">ลงชื่อผู้ตรวจ</div>
    <div class="field-card">
      <label>ชื่อ-สกุล Worker</label>
      <input type="text" id="workerName" placeholder="พิมพ์ชื่อ-สกุล...">
    </div>
  </div>
  <button class="submit-btn" onclick="submitWorker()">ส่งให้ Foreman อนุมัติ →</button>
</div>

<!-- SUCCESS -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">✅</div>
  <div class="success-title">ส่งสำเร็จแล้ว!</div>
  <div class="success-sub">รอ Foreman เข้ามาตรวจสอบและอนุมัติ</div>
  <div class="success-info" id="successInfo"></div>
  <button class="reset-btn" onclick="resetForm()">+ ตรวจรอบถัดไป (Stage เดิม)</button>
  <button class="home-btn" onclick="goHome()">🏠 กลับหน้าหลัก</button>
</div>

<div class="toast" id="toast"></div>

const h = today.getHours();
document.getElementById("inputShift").value = (h>=18||h<6)?"B":"A";

// ============================================================
// NAVIGATION
// ============================================================
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+id).classList.add("active");
  document.getElementById("successScreen").classList.remove("show");
  document.getElementById("page-form").style.display = "";
  window.scrollTo(0,0);
}

function updateHeader(){
  const backBtn = document.getElementById("backBtn");
  const bc = document.getElementById("breadcrumb");

  if(!nav.group){
    document.getElementById("headerLabel").textContent="Worker — ตรวจสอบ";
    document.getElementById("headerName").textContent="เลือก Group";
    document.getElementById("headerSub").textContent="กรุณาเลือก Group ของคุณ";
    backBtn.style.display="none";
    bc.innerHTML="";
  } else if(!nav.type){
    document.getElementById("headerLabel").textContent="Group "+nav.group;
    document.getElementById("headerName").textContent="เลือกประเภทตรวจสอบ";
    document.getElementById("headerSub").textContent="กรุณาเลือกประเภทรายการ";
    backBtn.style.display="block";
    bc.innerHTML=`<span>${nav.group}</span>`;
  } else if(!nav.stage){
    const typeLabel = STATION_DATA[nav.group][nav.type].label;
    document.getElementById("headerLabel").textContent="Group "+nav.group+" · "+typeLabel;
    document.getElementById("headerName").textContent="เลือก Stage";
    document.getElementById("headerSub").textContent="กรุณาเลือก Stage";
    backBtn.style.display="block";
    bc.innerHTML=`<span>${nav.group}</span> › <span>${typeLabel}</span>`;
  } else if(getSubtypes().length && !nav.subtype){
    const typeLabel = STATION_DATA[nav.group][nav.type].label;
    document.getElementById("headerLabel").textContent=typeLabel+" · "+nav.stage;
    document.getElementById("headerName").textContent="เลือกรายละเอียด";
    document.getElementById("headerSub").textContent="กรุณาเลือกตำแหน่ง/รายละเอียด";
    backBtn.style.display="block";
    bc.innerHTML=`<span>${nav.group}</span> › <span>${typeLabel}</span> › <span>${nav.stage}</span>`;
  } else {
    const typeLabel = STATION_DATA[nav.group][nav.type].label;
    const fullName = nav.stage + (nav.subtype ? " ("+nav.subtype+")" : "");
    document.getElementById("headerLabel").textContent=typeLabel;
    document.getElementById("headerName").textContent=fullName;
    document.getElementById("headerSub").textContent=today.toLocaleDateString("th-TH",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
    backBtn.style.display="block";
    bc.innerHTML=`<span>${nav.group}</span> › <span>${typeLabel}</span> › <span>${fullName}</span>`;
  }
}

function getSubtypes(){
  if(!nav.group || !nav.type || !nav.stage) return [];
  return STATION_DATA[nav.group][nav.type].stages[nav.stage] || [];
}

function goBack(){
  if(nav.subtype !== null && getSubtypes().length){ nav.subtype=null; updateHeader(); renderStages(); showPage("stage"); }
  else if(nav.stage){ nav.stage=null; nav.subtype=null; updateHeader(); renderTypes(); showPage("type"); }
  else if(nav.type){ nav.type=null; nav.stage=null; updateHeader(); renderGroups(); showPage("group"); }
  else if(nav.group){ nav.group=null; updateHeader(); renderGroups(); showPage("group"); }
}

function goHome(){
  nav={group:null,type:null,stage:null,subtype:null};
  document.getElementById("workerName").value="";
  document.getElementById("remarkText").value="";
  updateHeader();
  renderGroups();
  showPage("group");
}

// ============================================================
// RENDER NAVIGATION
// ============================================================
function renderGroups(){
  const grid = document.getElementById("groupGrid");
  grid.innerHTML="";
  Object.keys(STATION_DATA).forEach(g=>{
    const typeCount = Object.keys(STATION_DATA[g]).length;
    const el=document.createElement("div");
    el.className="nav-card";
    el.innerHTML=`<div class="nav-icon">🏭</div><div class="nav-info"><div class="nav-title">Group ${g}</div><div class="nav-sub">${typeCount} ประเภทรายการตรวจ</div></div><div class="nav-arrow">›</div>`;
    el.onclick=()=>{ nav.group=g; updateHeader(); renderTypes(); showPage("type"); };
    grid.appendChild(el);
  });
}

function renderTypes(){
  const grid = document.getElementById("typeGrid");
  grid.innerHTML="";
  const types = STATION_DATA[nav.group];
  Object.entries(types).forEach(([typeKey, typeData])=>{
    const stageCount = Object.keys(typeData.stages).length;
    const el=document.createElement("div");
    el.className="nav-card";
    el.innerHTML=`<div class="nav-icon">${TYPE_ICONS[typeKey]||"📋"}</div><div class="nav-info"><div class="nav-title">${typeData.label}</div><div class="nav-sub">${stageCount} Station</div></div><div class="nav-arrow">›</div>`;
    el.onclick=()=>{ nav.type=typeKey; updateHeader(); renderStages(); showPage("stage"); };
    grid.appendChild(el);
  });
}

function renderStages(){
  const grid = document.getElementById("stageGrid");
  grid.innerHTML="";
  const stages = STATION_DATA[nav.group][nav.type].stages;
  Object.entries(stages).forEach(([stageName, subtypes])=>{
    const el=document.createElement("div");
    el.className="nav-card";
    const subInfo = subtypes.length ? `${subtypes.length} รายละเอียดย่อย` : "รายการตรวจพื้นฐาน";
    el.innerHTML=`<div class="nav-icon">📍</div><div class="nav-info"><div class="nav-title">${stageName}</div><div class="nav-sub">${subInfo}</div></div><div class="nav-arrow">›</div>`;
    el.onclick=()=>{
      nav.stage=stageName; nav.subtype=null;
      updateHeader();
      const subs = getSubtypes();
      if(subs.length){ renderSubtypes(); showPage("subtype"); }
      else { initForm(); showPage("form"); }
    };
    grid.appendChild(el);
  });
}

function renderSubtypes(){
  const row = document.getElementById("subtypeRow");
  row.innerHTML="";
  getSubtypes().forEach(sub=>{
    const chip=document.createElement("div");
    chip.className="subtype-chip";
    chip.textContent=sub;
    chip.onclick=()=>{ nav.subtype=sub; updateHeader(); initForm(); showPage("form"); };
    row.appendChild(chip);
  });
}

// ============================================================
// FORM
// ============================================================
function initForm(){
  currentChecks = CHECKS_BY_TYPE[nav.type] || DEFAULT_CHECKS;
  checkState={};
  currentChecks.forEach(c=>{ checkState[c.id]={result:null,comment:"",value:""}; });
  renderChecks();
}

function renderChecks(){
  const list=document.getElementById("checkList");
  list.innerHTML="";
  currentChecks.forEach(c=>{
    const s=checkState[c.id];
    const div=document.createElement("div");
    div.className="check-item"+(s.result==="pass"?" pass":s.result==="fail"?" fail":"");
    div.setAttribute("data-id", c.id);

    const numericRow = c.numeric ? `
      <div class="comment-row" style="display:flex;align-items:center;gap:8px;margin-top:8px;margin-bottom:0;">
        <input type="number" inputmode="decimal" placeholder="ค่าที่วัดได้ (${c.min}-${c.max})"
          style="flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-family:'Sarabun',sans-serif;font-size:14px;outline:none;"
          value="${s.value||""}" oninput="setV(${c.id},this.value)">
        <span style="font-size:13px;color:var(--muted);min-width:40px;">${c.unit||""}</span>
      </div>` : "";

    const toggleOrStatus = c.numeric
      ? `<div class="numeric-status" style="flex-shrink:0;margin-top:2px;">
           ${s.result==="pass"?'<span style="font-size:11px;font-weight:700;color:var(--pass);background:var(--pass-bg);border-radius:6px;padding:4px 10px;">✓ ผ่าน</span>'
             :s.result==="fail"?'<span style="font-size:11px;font-weight:700;color:var(--red);background:var(--fail-bg);border-radius:6px;padding:4px 10px;">✗ ไม่ผ่าน</span>'
             :'<span style="font-size:11px;color:var(--muted);">รอกรอกค่า</span>'}
         </div>`
      : `<div class="toggle-group">
           <button class="tbtn ${s.result==="pass"?"ap":""}" onclick="setR(${c.id},'pass')">O</button>
           <button class="tbtn ${s.result==="fail"?"af":""}" onclick="setR(${c.id},'fail')">✗</button>
         </div>`;

    div.innerHTML=`
      <div class="check-top">
        <span class="check-num">${c.id}</span>
        <div class="check-info">
          <div class="check-name">${c.name}</div>
          <div class="check-std">${c.standard}</div>
        </div>
        ${toggleOrStatus}
      </div>
      ${numericRow}
      ${s.result==="fail"?`<div class="comment-row"><textarea placeholder="ระบุสิ่งที่พบ / แจ้งหัวหน้าแล้วหรือยัง..." oninput="setC(${c.id},this.value)">${s.comment}</textarea></div>`:""}
    `;
    list.appendChild(div);
  });
  updateProgress();
}

function setR(id,v){checkState[id].result=checkState[id].result===v?null:v;if(checkState[id].result!=="fail")checkState[id].comment="";renderChecks();}
function setC(id,v){checkState[id].comment=v;}
function setV(id,v){
  checkState[id].value=v;
  const c = currentChecks.find(x=>x.id===id);
  let needsCommentBox = false;

  if(c && c.numeric){
    if(v===""){
      checkState[id].result = null;
    } else {
      const num = parseFloat(v);
      if(!isNaN(num)){
        const prevResult = checkState[id].result;
        checkState[id].result = (num>=c.min && num<=c.max) ? "pass" : "fail";
        if(checkState[id].result!=="fail") checkState[id].comment="";
        needsCommentBox = (checkState[id].result !== prevResult); // ต้อง re-render เฉพาะถ้าสถานะเปลี่ยนจริง (fail<->pass) เพื่อโชว์/ซ่อนช่อง comment
      }
    }
  }

  if(needsCommentBox){
    // re-render แค่ตอนจำเป็น (สถานะเปลี่ยนจาก pass<->fail) แต่คง focus ไว้ที่ input เดิมหลัง render
    const activeId = document.activeElement ? document.activeElement.id : null;
    renderChecks();
    // คืน focus กลับไปที่ input ตัวเลขเดิม แล้วเลื่อน cursor ไปท้ายข้อความ
    setTimeout(()=>{
      const inputs = document.querySelectorAll(`.check-item input[type="number"]`);
      // หา input ที่ตรงกับ id นี้โดยอ้างจาก oninput attribute
      const target = Array.from(inputs).find(inp => inp.getAttribute("oninput") === `setV(${id},this.value)`);
      if(target){ target.focus(); target.setSelectionRange(target.value.length, target.value.length); }
    },0);
  } else {
    // อัปเดตแค่กล่อง status (ผ่าน/ไม่ผ่าน/รอกรอกค่า) และสีกรอบ โดยไม่ re-render ทั้งลิสต์
    updateNumericStatusUI(id);
  }
  updateProgress();
}

function updateNumericStatusUI(id){
  const item = document.querySelector(`.check-item[data-id="${id}"]`);
  if(!item) return;
  const s = checkState[id];
  item.classList.remove("pass","fail");
  if(s.result==="pass") item.classList.add("pass");
  if(s.result==="fail") item.classList.add("fail");

  const statusBox = item.querySelector(".numeric-status");
  if(statusBox){
    if(s.result==="pass"){
      statusBox.innerHTML = '<span style="font-size:11px;font-weight:700;color:var(--pass);background:var(--pass-bg);border-radius:6px;padding:4px 10px;">✓ ผ่าน</span>';
    } else if(s.result==="fail"){
      statusBox.innerHTML = '<span style="font-size:11px;font-weight:700;color:var(--red);background:var(--fail-bg);border-radius:6px;padding:4px 10px;">✗ ไม่ผ่าน</span>';
    } else {
      statusBox.innerHTML = '<span style="font-size:11px;color:var(--muted);">รอกรอกค่า</span>';
    }
  }
}

function updateProgress(){
  const total=currentChecks.length;
  const done=Object.values(checkState).filter(s=>s.result!==null).length;
  document.getElementById("pFill").style.width=(done/total*100)+"%";
  document.getElementById("pLabel").textContent=`ตรวจแล้ว ${done} / ${total} รายการ`;
}

// ============================================================
// SUBMIT
// ============================================================
function buildFullStageName(){
  // ถ้ามี subtype ที่มีตัวอักษร (LH/RH) ให้เติม "-" ต่อท้าย ตามที่ระบุไว้
  if(!nav.subtype) return nav.stage;
  return nav.stage + "-" + nav.subtype;
}

function submitWorker(){
  const worker=document.getElementById("workerName").value.trim();
  const date=document.getElementById("inputDate").value;
  const shift=document.getElementById("inputShift").value;
  const undone=currentChecks.filter(c=>checkState[c.id].result===null);
  if(undone.length){showToast("ยังตรวจไม่ครบ "+undone.length+" รายการ","err");return;}
  if(!worker){showToast("กรุณาใส่ชื่อ Worker","err");return;}

  const typeLabel = STATION_DATA[nav.group][nav.type].label;
  const fullStage = buildFullStageName();

  const entry={
    id:"W"+Date.now(),
    timestamp_worker:new Date().toISOString(),
    timestamp_foreman:null,
    date,shift,
    group:nav.group,
    type:nav.type, type_label:typeLabel,
    stage:fullStage, stage_base:nav.stage, subtype:nav.subtype,
    worker, foreman:null,
    remark:document.getElementById("remarkText").value.trim(),
    checks:currentChecks.map(c=>({id:c.id,name:c.name,result:checkState[c.id].result,comment:checkState[c.id].comment,value:checkState[c.id].value||""})),
    status:"pending"
  };

  // บันทึก localStorage
  const all=JSON.parse(localStorage.getItem("isuzu_submissions")||"[]");
  all.push(entry);
  localStorage.setItem("isuzu_submissions",JSON.stringify(all));

  // ส่งไป Google Sheets
  try{
    const encoded = encodeURIComponent(JSON.stringify(entry));
    const img = new Image();
    img.src = SHEETS_URL + "?payload=" + encoded;
  }catch(e){ console.log("Sheets error:", e); }

  // แสดง success
  const failC=entry.checks.filter(c=>c.result==="fail").length;
  document.getElementById("successInfo").innerHTML=`
    <b>Group:</b> ${nav.group} &nbsp;|&nbsp; <b>ประเภท:</b> ${typeLabel}<br>
    <b>Stage:</b> ${fullStage}<br>
    <b>วันที่:</b> ${date} &nbsp;|&nbsp; <b>กะ:</b> SHIFT ${shift}<br>
    <b>Worker:</b> ${worker}<br>
    <b>ผล:</b> ผ่าน ${currentChecks.length-failC}/${currentChecks.length} รายการ
    ${failC?`<br><span style="color:var(--red);font-weight:600;">⚠ ไม่ผ่าน ${failC} รายการ</span>`:""}
  `;
  document.getElementById("page-form").style.display="none";
  document.getElementById("successScreen").classList.add("show");
  window.scrollTo(0,0);
}

function resetForm(){
  document.getElementById("workerName").value="";
  document.getElementById("remarkText").value="";
  document.getElementById("successScreen").classList.remove("show");
  document.getElementById("page-form").style.display="none";
  initForm();
  showPage("form");
}

function showToast(msg,type=""){
  const t=document.getElementById("toast");
  t.textContent=msg;t.className="toast show "+type;
  setTimeout(()=>t.className="toast",3000);
}

// START
updateHeader();
renderGroups();
</script>
</body>
</html>
