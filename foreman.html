<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foreman Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap');
:root{--red:#CC0000;--red-dark:#A00000;--pass:#057A55;--pass-bg:#ECFDF5;--pass-border:#6EE7B7;--fail-bg:#FFF5F5;--fail-border:#FFBABA;--bg:#F5F5F5;--card:#fff;--text:#1A1A1A;--muted:#6B7280;--border:#E5E7EB;--shadow:0 2px 12px rgba(0,0,0,.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-box{background:var(--card);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.12);padding:32px 24px;width:100%;max-width:360px;text-align:center;}
.login-logo{font-size:28px;font-weight:800;color:var(--red);letter-spacing:.06em;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
.login-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:left;margin-bottom:5px;}
.login-input{width:100%;border:2px solid var(--border);border-radius:10px;padding:13px 14px;font-family:'Sarabun',sans-serif;font-size:18px;font-weight:700;letter-spacing:.25em;text-align:center;outline:none;background:#F9FAFB;transition:border-color .15s;margin-bottom:16px;}
.login-input:focus{border-color:var(--red);background:#fff;}
.login-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:10px;padding:14px;font-family:'Sarabun',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:background .15s;}
.login-btn:hover{background:var(--red-dark);}
.login-err{color:var(--red);font-size:13px;margin-top:10px;min-height:20px;}
/* HEADER */
.header{background:var(--red);color:#fff;padding:18px 16px 30px;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.logo{font-size:18px;font-weight:800;letter-spacing:.06em;}
.logo span{display:block;font-size:10px;font-weight:500;opacity:.6;}
.user-pill{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.4);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;}
.header-label{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.65;margin-bottom:2px;}
.header-name{font-size:20px;font-weight:800;}
.header-sub{font-size:13px;opacity:.75;margin-top:2px;}
/* TABS */
.tabs{display:flex;background:var(--card);margin:0 14px;}
.tab{flex:1;padding:11px 6px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;color:var(--muted);transition:all .15s;user-select:none;}
.tab:first-child{border-radius:12px 0 0 0;}.tab:last-child{border-radius:0 12px 0 0;}
.tab.active{color:var(--red);border-bottom-color:var(--red);}
.badge{display:inline-block;background:var(--red);color:#fff;border-radius:99px;font-size:10px;padding:1px 6px;margin-left:4px;vertical-align:middle;}
/* SECTION */
.section{margin:14px 14px 0;}
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:8px;}
/* CARDS */
.sub-card{background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:14px;box-shadow:var(--shadow);margin-bottom:10px;}
.sub-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.sub-title{font-size:15px;font-weight:700;}
.sub-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.chip{font-size:11px;font-weight:700;border-radius:99px;padding:3px 10px;flex-shrink:0;}
.chip-pending{background:#FEF3C7;color:#92400E;}
.chip-pass{background:var(--pass-bg);color:var(--pass);}
.chip-fail{background:var(--fail-bg);color:var(--red);}
.check-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid var(--border);font-size:13px;}
.check-row-name{flex:1;padding-right:8px;line-height:1.3;}
.rtag{font-size:12px;font-weight:700;padding:2px 8px;border-radius:6px;flex-shrink:0;}
.rtag-pass{background:var(--pass-bg);color:var(--pass);}
.rtag-fail{background:var(--fail-bg);color:var(--red);}
.approve-row{display:flex;gap:8px;margin-top:12px;}
.approve-row input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:9px 10px;font-family:'Sarabun',sans-serif;font-size:14px;outline:none;background:#F9FAFB;transition:border-color .15s;}
.approve-row input:focus{border-color:var(--pass);background:#fff;}
.approve-btn{background:var(--pass);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s;}
.approve-btn:hover{background:#046040;}
.approve-btn:disabled{background:#9CA3AF;cursor:not-allowed;}
.approved-banner{background:var(--pass-bg);color:var(--pass);border-radius:8px;padding:9px 12px;font-size:13px;font-weight:600;text-align:center;margin-top:10px;}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-state .icon{font-size:40px;margin-bottom:10px;}
/* STATION SUMMARY (tab 2) */
.station-grid{display:flex;flex-direction:column;gap:8px;}
.station-row{background:var(--card);border-radius:12px;border:1.5px solid var(--border);padding:12px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;}
.station-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.dot-done{background:var(--pass);}
.dot-issue{background:var(--red);}
.dot-pending{background:#D1D5DB;}
.station-name{font-size:14px;font-weight:600;flex:1;}
.station-status{font-size:12px;font-weight:600;}
/* page */
.page{display:none;}.page.active{display:block;}
/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#111827;color:#fff;border-radius:12px;padding:13px 20px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:transform .3s;z-index:999;text-align:center;min-width:260px;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--pass);}.toast.err{background:var(--red);}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">ISUZU</div>
    <div class="login-sub">Foreman — FRG</div>
    <label class="login-label">รหัสพนักงาน Foreman</label>
    <input class="login-input" id="codeInput" type="text" maxlength="6" placeholder="XXXXXX"
      oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- MAIN SCREEN -->
<div id="mainScreen" style="display:none;">
  <div class="header">
    <div class="header-top">
      <div><div class="logo">ISUZU <span>FRG · Foreman</span></div></div>
      <div class="user-pill" onclick="logout()" id="userPill">FM001 ▾</div>
    </div>
    <div class="header-label">หน้าอนุมัติ Foreman</div>
    <div class="header-name" id="fmName">—</div>
    <div class="header-sub" id="fmStations">—</div>
  </div>

  <div style="background:var(--card);margin:0 14px;">
    <div class="tabs" style="margin:0;">
      <div class="tab active" id="tab-approve" onclick="switchTab('approve')">
        ✅ อนุมัติ <span class="badge" id="pendingBadge" style="display:none">0</span>
      </div>
      <div class="tab" id="tab-stations" onclick="switchTab('stations')">📊 Station ของฉัน</div>
    </div>
  </div>

  <!-- APPROVE TAB -->
  <div class="page active" id="page-approve">
    <div class="section">
      <div class="section-title" id="approveTitle">รายการรอการอนุมัติ</div>
      <div id="approveList"></div>
    </div>
  </div>

  <!-- STATIONS TAB -->
  <div class="page" id="page-stations">
    <div class="section">
      <div class="section-title">สถานะ Station ที่ดูแล</div>
      <div class="station-grid" id="stationGrid"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// FOREMAN MASTER DATA (สมมติ — แก้ตามข้อมูลจริงได้)
// ============================================================
const FOREMAN_DB = {
  "FM001": { name:"สมชาย ใจดี",    shift:"A", stations:["MA1-04","MA1-05","MA1-06"] },
  "FM002": { name:"สมหญิง รักงาน", shift:"A", stations:["MA1-07","MA1-08"] },
  "FM003": { name:"วิชัย แข็งแรง", shift:"A", stations:["MA1-09","MA1-10","MA1-11"] },
  "FM004": { name:"นิภา สดใส",     shift:"A", stations:["MA1-12","MA1-13"] },
  "FM005": { name:"ประสิทธิ์ มั่นคง",shift:"B", stations:["MA1-04","MA1-05","MA1-06"] },
  "FM006": { name:"รัตนา เจริญ",   shift:"B", stations:["MA1-07","MA1-08"] },
  "FM007": { name:"อนันต์ ชัยชนะ", shift:"B", stations:["MA1-09","MA1-10","MA1-11"] },
  "FM008": { name:"กนกวรรณ สุข",   shift:"B", stations:["MA1-12","MA1-13"] },
};

let currentFM = null;

function doLogin(){
  const code = document.getElementById("codeInput").value.trim().toUpperCase();
  const fm = FOREMAN_DB[code];
  if(!fm){ document.getElementById("loginErr").textContent="รหัสพนักงานไม่ถูกต้อง กรุณาลองใหม่"; return; }
  currentFM = { code, ...fm };
  document.getElementById("loginErr").textContent="";
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("mainScreen").style.display="block";
  document.getElementById("userPill").textContent = code+" ▾";
  document.getElementById("fmName").textContent = fm.name;
  document.getElementById("fmStations").textContent = "SHIFT "+fm.shift+" · ดูแล "+fm.stations.join(", ");
  renderApprove();
  updateBadge();
}

function logout(){
  currentFM=null;
  document.getElementById("codeInput").value="";
  document.getElementById("mainScreen").style.display="none";
  document.getElementById("loginScreen").style.display="flex";
}

function switchTab(t){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.getElementById("page-"+t).classList.add("active");
  document.getElementById("tab-"+t).classList.add("active");
  if(t==="stations") renderStations();
  if(t==="approve") renderApprove();
}

function getSubs(){
  return JSON.parse(localStorage.getItem("isuzu_submissions")||"[]");
}
function saveSubs(arr){
  localStorage.setItem("isuzu_submissions",JSON.stringify(arr));
}

function getMyPending(){
  const all = getSubs();
  return all.filter(s => s.status==="pending" && currentFM.stations.includes(s.stage) && s.shift===currentFM.shift);
}
function getMyDone(){
  const all = getSubs();
  return all.filter(s => s.status==="approved" && s.foreman_code===currentFM.code);
}

function updateBadge(){
  const n = getMyPending().length;
  const b = document.getElementById("pendingBadge");
  b.style.display=n?"inline":"none"; b.textContent=n;
}

// ===== RENDER APPROVE =====
function renderApprove(){
  if(!currentFM) return;
  const list = document.getElementById("approveList");
  const pending = getMyPending();
  const done = getMyDone();
  list.innerHTML="";
  if(!pending.length && !done.length){
    list.innerHTML=`<div class="empty-state"><div class="icon">✅</div><p>ไม่มีรายการรอในตอนนี้</p></div>`;
    return;
  }
  if(pending.length){
    const h=document.createElement("div");
    h.className="section-title";h.style.cssText="color:#92400E;margin-bottom:8px;";
    h.textContent=`🔴 รอการอนุมัติ (${pending.length})`;
    list.appendChild(h);
    pending.forEach(s=>list.appendChild(buildApproveCard(s,false)));
  }
  if(done.length){
    const h=document.createElement("div");
    h.className="section-title";h.style.cssText="margin:14px 0 8px;";
    h.textContent=`✅ อนุมัติแล้ว (${done.length})`;
    list.appendChild(h);
    done.forEach(s=>list.appendChild(buildApproveCard(s,true)));
  }
}

function buildApproveCard(s, isDone){
  const fails = s.checks.filter(c=>c.result==="fail");
  const passC = s.checks.filter(c=>c.result==="pass").length;
  const card = document.createElement("div");
  card.className="sub-card";
  const t = new Date(s.timestamp_worker).toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
  const chip = isDone
    ? `<span class="chip ${fails.length?"chip-fail":"chip-pass"}">${fails.length?"⚠ พบปัญหา":"✓ ผ่าน"}</span>`
    : `<span class="chip chip-pending">รออนุมัติ</span>`;
  card.innerHTML=`
    <div class="sub-header">
      <div>
        <div class="sub-title">Stage ${s.stage} — SHIFT ${s.shift}</div>
        <div class="sub-meta">${s.date} · ส่งเมื่อ ${t} · Worker: ${s.worker}</div>
      </div>${chip}
    </div>
    ${s.checks.map(c=>`
      <div class="check-row">
        <div class="check-row-name">${c.name.replace(/\n/g," ")}${c.comment?`<br><span style="font-size:11px;color:var(--muted);">↳ ${c.comment}</span>`:""}</div>
        <span class="rtag ${c.result==="pass"?"rtag-pass":"rtag-fail"}">${c.result==="pass"?"O":"✗"}</span>
      </div>`).join("")}
    ${s.remark?`<div style="margin-top:8px;font-size:12px;color:var(--muted);">📝 ${s.remark}</div>`:""}
    ${!isDone?`
      <div class="approve-row">
        <input type="text" id="fn_${s.id}" value="${currentFM.name}" placeholder="ชื่อ Foreman">
        <button class="approve-btn" id="ab_${s.id}" onclick="approve('${s.id}')">✓ อนุมัติ</button>
      </div>
    `:`<div class="approved-banner">✓ อนุมัติโดย ${s.foreman} · ${new Date(s.timestamp_foreman).toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"})}</div>`}
  `;
  return card;
}

function approve(id){
  const nameEl = document.getElementById("fn_"+id);
  const name = nameEl ? nameEl.value.trim() : currentFM.name;
  if(!name){showToast("กรุณาใส่ชื่อ Foreman","err");return;}
  const btn = document.getElementById("ab_"+id);
  if(btn){btn.disabled=true;btn.innerHTML=`<span class="spinner"></span>ส่งข้อมูล...`;}

  const all = getSubs();
  const idx = all.findIndex(s=>s.id===id);
  if(idx===-1) return;
  all[idx].foreman = name;
  all[idx].foreman_code = currentFM.code;
  all[idx].timestamp_foreman = new Date().toISOString();
  all[idx].status = "approved";
  saveSubs(all);

  // ส่ง Google Sheets (เปิดเมื่อมี URL)
  // const URL = "YOUR_APPS_SCRIPT_URL";
  // fetch(URL,{method:"POST",mode:"no-cors",body:JSON.stringify(all[idx])});

  updateBadge();
  renderApprove();
  showToast("✓ อนุมัติและส่ง Office สำเร็จ!","ok");
}

// ===== RENDER STATIONS =====
function renderStations(){
  if(!currentFM) return;
  const grid = document.getElementById("stationGrid");
  const all = getSubs();
  const today = new Date().toISOString().split("T")[0];
  grid.innerHTML="";
  currentFM.stations.forEach(st=>{
    const todaySubs = all.filter(s=>s.stage===st && s.shift===currentFM.shift && s.date===today);
    const approved = todaySubs.filter(s=>s.status==="approved");
    const hasFail = approved.some(s=>s.checks.some(c=>c.result==="fail"));
    const isDone = approved.length>0;
    const row = document.createElement("div");
    row.className="station-row";
    const dotClass = !isDone?"dot-pending":hasFail?"dot-issue":"dot-done";
    const statusText = !isDone?"รอตรวจสอบ":hasFail?"⚠ พบปัญหา":"✓ ผ่านแล้ว";
    const statusColor = !isDone?"var(--muted)":hasFail?"var(--red)":"var(--pass)";
    row.innerHTML=`
      <div class="station-dot ${dotClass}"></div>
      <div class="station-name">Stage ${st}</div>
      <div class="station-status" style="color:${statusColor}">${statusText}</div>
    `;
    grid.appendChild(row);
  });
}

function showToast(msg,type=""){
  const t=document.getElementById("toast");
  t.textContent=msg;t.className="toast show "+type;
  setTimeout(()=>t.className="toast",3000);
}

// auto-refresh pending ทุก 30 วิ
setInterval(()=>{if(currentFM){updateBadge();}},30000);
</script>
</body>
</html>
